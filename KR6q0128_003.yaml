body:
  text: 門人後曹山慧霞編門人廣輝釋後學晦然補洞山三句謙本所附曹山舉洞山三句恐混百丈三句先揀出百丈三句第一句者是依住調伏即無散失便是知有名為初善第二句者絶前句依住調伏為是知非故捨是名中善緣中善有捨解不忘故第三句者即無捨解此是出纏三句也如何是一句丈云不入教如何是三句丈云不入念此俱表向上事念者塵也不入是事也若説一句令衆生入地獄若説三句渠自入地獄不干教主事又云不入念者念是剎郍也亦云一補曰續仙傳云異人丁約隱於卒伍韋子威事之一日辭去謂子威曰郎君得道尚隔兩塵子威問其故約曰儒謂之世釋謂之劫道謂之亦云一毫亦云正恁麼時亦云遍亦云一生也以要言之不擬心是也洞山三句向上一句門頭一句超百億一句向上一句例者如藥山云我有一句子未曾向人説道吾云相隨來龐居士問馬祖不與萬法為侶者是什麼人祖云待儞一口吸盡西江水我即向儞道問如何是異云我若向儞道驢年得異麼此是咬齒一句雖然如此亦是正位中來是無語中有語故云來也來者是那邊人看遮邊人為來也亦是為人故就不圓轉中而圓轉道出即是來也無語中有語也門頭一句例者如問石霜如何是一句云非句也亦云一句也無又云諸聖有祖在汝家有祖在云如何是諸聖祖云非聖如何是學人祖云非凡又問大光如何是別行一句云教裡明不得但是就偏位辨得圓者皆是門頭一句也是有語中無語也超百億一句例者即絶續句也亦云不來之句亦云倒底一句亦云一人當千人亦云相應之之句也龐居士云必竟真智一人功喚作一人及第亦云喚作過人䇿處雲居云一人及第萬人獲安補曰此所引語句皆至簡難詳按居士本録偈云神識自然無礙廓周法界等虗空不假坐禪持戒律只須真智一人功又十方來一會各自學無為此是選佛處心通及第歸又衆生多品類諸佛只一般庶人見天子知隔幾重關若有過人䇿欲見亦不難䇿中契聖理坐取國家官又曹洞宗派録九峰虔上堂舉古云如似十人同選但看榜頭一人一人已過九人亦過一人不過纍及九人僧便問如何是榜頭師云先須得過僧云恁麼則九人也應師云一人得過九人何難僧云恁麼則禮拜去也師云汝是什麼心行云云今以九人云萬人蓋以意取之耳餘則未暇尋撿亦云一説亦云一念一話一音一句訓誨八萬塵勞法門亦云度衆生若一衆生未度則我不成正覺一人得度總得度以要言之則不續之句也若不續時即不無超也僧問疏山云如何是超百億一句師云是向去邊事云因什麼喚作向去師云一句了然超百億不是向去是什麼云如何是門頭一句師云奧來出世邊事云既是出世邊事為什麼喚作門頭師云諸佛是傳語人祖師是把門漢不是門頭一句是什麼云佛傳什麼人語師云還知有佛向上人也云祖師把什麼門師云一切人近不得喚作諸聖門云如何是向上一句師云全體本位是云既是全體本位云何名為向上師云三句中最上喚作向上一句云向上一句與向上事還同也無師云不同云如何是向上一句師云適來道全體本位云如何是向上事師云三句不落云不落三句麼事如何師云非但新豐踈山亦不知也補曰踈山語舊在上道今移編於此寶鏡三昧玄義新補舊無注要易説聽今夾岫師注四明天童沙門雲外雲岫注如是之法佛祖密付古德道如是如是善自護持此實證實語之事體如金剛不變不壞唯佛與佛乃能知之心心相照如鏡對鏡光光互融各不相借豈非密用者哉汝今得之善自保護此付法授受之際毫釐無差護惜受持使慧命不斷故也銀杯盛雪明月藏鷺類之弗齊混則知處夫履道一如者內外明皎異中有同同中有異如銀與雪如鷺與月色雖相類體未同一所謂鷺鷀立雪非同色明月蘆花不似他當去彼取此以求真性意不在言表機亦赴到此者獲自然智慧不求言其言自至雲從龍風從虎非人力之所能為也動成窠臼差落顧佇求寂者沈空忘空者墮見捨空求道道不可得空空於內情存顧佇所謂一塵起而翳天一芥隨而覆地背觸俱非如大火聚夫進之不可即退之不可離心如火聚莫能安立到者裡能懸崖撒手竿頭進步前後際斷方為究竟但形文彩即屬染污祖師道一切語言是提婆宗以者個為主然失之者喪其道得之者污其道不亦難乎夜半正明天曉不露夫夜半正明當求明於暗天曉不露當求暗於明若也暗中得明暗不為礙若也明中得暗明不為礙所謂如來堅密身一切塵中現為物作主用拔諸苦夫佛性流入一切處與其同事引凡入聖度衆生而無怠所謂有物先天地無形本寂寥能為萬象主不逐四時凋雖非有為不是無語佛以無為法用於有為法中立言以化衆生佛道深遠非智莫入如臨寶鏡形影相覩汝不是渠渠正是汝夫鏡能鑑物從求發現一無差惑雖偽而真雖真而偽若能以真求偽以偽求真則真偽自見如世嬰兒五相完具不去不來不起不住婆婆和和有句無句終不得物言未正故夫新生孩子六識已具如水上打毬子不滅不停婆和學語意意存於語語不可辨當待其機熟然後自透重離六爻偏正回互疊而為三變盡成五重離易之二五離者麗也麗者明也二五重離也中正之謂也疊而為三者正中偏偏中正正中來也變盡成五者兼中至兼中到通前為五也三則由漸入頓五則由頓入漸化衆生同歸涅槃如荎草味如金剛杵經云譬如有藥為呪所持見聞同住憶念之者諸煩惱病悉皆除盡譬如金剛杵能除一切諸魔外道正中妙挾敲唱準舉通宗通塗挾帶挾路錯然而吉不可犯忤此正中兼帶理事準行敲唱以鳴其道也偏正互融事得理遣觸途無滯故曰通宗通塗出識不染諸緣入識不居陰界錯然則吉其或不然則為犯忤天真而妙不屬迷語因緣時節寂然昭著經云虗空無動轉出生一切諸有為法萬法變滅虗空無壞豈有迷悟哉遇緣即宗建立諸法隨其昭著如四時行焉細入無間大絶方所毫忽之差不應律呂夫至理者入鄰虗而不知其小攝世界而不知其大與陰陽同一造化理之妙也不應律呂道無與焉所謂毫𨤲有差天地懸隔今有頓漸緣立宗趣宗趣分矣即是規矩夫正偏五位君臣之分也君視臣臣奉君君臣慶會中道立矣兼中至從漸入頓順成者規也兼中到從頓入漸逆成者矩也不規矩不能見其道觀者當觀規矩宗通趣極真常流注外寂中搖係駒伏鼠宗通者寂寥非內趣極者寬廓非外真常流注己見猶存門裡出身則易身裡出門則難駒奔鼠竄熏習難忘先聖悲之為法檀度隨其顛倒以緇為素顛倒想滅肯心自許從上佛祖具大慈大悲大喜大捨四無量心度一切衆生為一切衆生之大施主隨衆生差別之性方便教導廣如來平等智慧見聞覺知悉得清淨非肯心自許者不能也要合古轍請觀前古夫學道者諦審先宗是何標格著佛衣誦佛書行佛行如是證之即佛也香嚴擊竹靈雲見桃花雪峰輥毬祕魔擎杈如是悟之即祖也佛祖之道人人本具豈生佛之有異耶佛道垂成十劫觀樹如虎之缺如馬之馵古人學道樹下冢間十年五載乃能成道所謂久受勤苦乃可得成雪山六年少林九年佛祖標格也積功多少如虎之缺如馬之馵虎之傷人一度耳生一缺傷人之多耳如鋸齒馬之後左足白曰馵左尚吉道德之驗喻此表之以有下劣寶几珍御以有驚異狸奴白牯非弊垢衣無以見珍御非狸奴無以見驚異佛祖向異類中行所謂入衆生界煩惱泥中乃能發阿耨多羅三藐三菩提心羿以巧力射中百步箭鋒相直巧力何喻木人方歌石兒起舞非情識到寧容思慮經云譬如射師有諸弟子雖未慣習其師技藝然其方便善巧餘一切人所不能及木人石兒無情識思慮喻其巧力非情識思慮所能到也臣奉於君子順於父不順不孝不奉非輔臣奉於君則有憂國之心子順於父則有克家之志如周公之於文王大舜之於瞽叟倘不忠不孝豈可當臣子之稱求道亦然念茲在茲釋之在茲感應道交可名曰道潛行密用如愚如魯但能相續名主中主潛行者不露密用者不覺如春在花或去或來如月在水不出不入主主不相見主中主也是以懸佛日之長明續慧命之不斷豈小補者哉寶鏡三昧玄義終汾陽昭廣智歌或五位或三路施設隨機巧回互不觸當今是本宗展手通玄無佛祖右敘洞上宗或君臣或父子量器方圓無彼此士庶公侯一道平愚智賢毫明漸次右敘石霜宗或全提或全用萬像森羅實不共青山不礙白雲飛隱隱當臺透金鳳右敘石頭藥山宗心聞賁曹洞宗派頌定齋間間居士曹洞贊人趙康文字周臣醉蓬萊看何移斗柄月轉銀盤夜明簾外露洗丹墀尚排班人末鶴出銀籠鳳辭靈木正翱天際帝闕雲深天顏霧映九重深祕回互偏圓混融明暗借位明功借功明位玉線金針辨細中細一句超然劫前消息任洞山不會石女謳歌木人撫掌泥牛驚起補曰嘗見天童上堂云一亘清虗夜正央桂宮老兔冷噴霜混融明暗無分處誰辨個中偏正方所以道正位雖正却偏偏位雖偏却圓正恁麼時作麼生辨良久云歷歷機前雙照眼堂堂象外萬年身又達觀穎公初謁大陽明安問洞上特設偏正君臣意明何事安曰父母未生時事又問如何體會安曰夜半正明天曉不露穎惘然棄去至石門理前話問聰禪師曰如何是父母未生時事聰曰糞擊兒又問如何是夜半至不露聰曰牡丹花下睡貓兒穎愈疑駭後一日聰從容謂曰此事如人學書點畫可做者拙否者工何故如此未忘法耳如有法執故自為斷續當筆忘手忘心乃可也穎於是默契其旨乃曰如石頭云執事元是迷契理亦非悟聰曰祖師意事理能盡乎穎恍如夢覺觀古人用處可謂心手虗間箭不虗發近代談此道者往往滯於名數謬解古人之妙處者多矣今見間間之作正抓著新豐癢處誰謂代無其人康文陽人初得法於慧林周禪師處終禮部尚書年七十四仕五朝官六鄉自奉養如寒士不知富貴為物蓋學道所得云詳見本傳重編曹洞五位卷上以上卷上終曹山本寂禪師三種墮四種異類三種墮夫沙門取食有三等墮作水牯牛是沙門墮不受食是尊貴墮不斷聲色是墮類只墮去是甚麼人分上事揀云欲知則是入異類中不認沙門邊事所以古人權借水牯牛為異類祇是事上異類非言語中異類若是言語中異類則是往來言語盡是類所以南泉道智不到處切忌道著道著則頭角生喚作如如早是變也直須向異中行如今須向異中道取異中事夫語中無語始得若是南泉病時有人問和尚百年後向甚麼處去泉云我向山下檀越家作一頭水牯牛去云某甲擬隨和尚去還得麼泉云若隨我銜一莖草來揀云這個是沙門轉身語所以道汝擬近銜一莖草來親近渠是呼為無漏始堪供養渠又云隨類者祇今於一切聲色物物上轉身去不隨階級喚作隨類墮又云尊貴墮者法身法性是尊貴邊事亦須轉却是尊貴墮祇如露地白牛是法身極則亦須轉却免他坐一色無辨處並是稱斷供養邊事欲須供養須得此食所以無味之味亦云無漏是堪供養並餘觸污之食非無漏解脫之食也有人問百丈以何為貪云無漏為貪雲巖云莫將以味為供養道吾云知有保任處盡是供養夫取正命食者須具三種墮是以僧問披毛戴角是甚麼墮不斷聲色是甚麼墮不受食是甚麼墮云披毛戴角是沙門墮不斷聲色是墮類不受食是尊貴墮不受食尊貴墮食者是本分事知有不取故云尊貴墮披毛戴角墮者不執沙門邊事及諸勝報位也不斷聲色隨類墮者為初心知有自己本分事回光時擯出諸色聲香味觸法得寧謐則成功後不報六塵墮而不昧任之無礙故云外道六師是汝師彼師所墮汝亦隨墮可以食食者則是正命食也亦本分事也祇是就六根門頭見聞覺知不被染污呼為墮不同向前怕也本分事猶不取況其餘又揀云沙門取食有三種墮作水牯牛是甚麼墮代云不處正位不揀其身始喚作沙門墮不斷聲色是甚麼墮代云凡情得盡聖量亦忘聲色塵中不應更斷乃可取食是為隨類墮又云彼師所墮汝亦隨墮乃可取食問如何是彼師所墮云田舍翁入聚落眼耳鼻舌身意俱失却云如何是隨類墮云不斷聲色又不失香味云如何是彼師云六處云如何是汝亦隨墮云存云存個甚麼云不得動著又不離聲色問不受食甚麼墮云了達正因不存勝解故云尊貴墮也又揀云沙門墮者亦不無其行亦不無其間雖有其間常無其間雖有其行常無其行其中此事切須知時節莫東西又溈山云我百年後作一頭水牯牛左脅上書溈山僧某甲一行字汝道當見之時喚作甚麼無對後曹山代云喚作水牯牛問未審此水牯牛還解耕稼否云灼然云是甚麼類云披毛戴角者云四時食何水草云不入口者云如何是水牯牛云不證聖云如何是銜一莖草云毛羽相似去問是超聖是超類云是超聖問如何是水牯牛云冥冥云如何是銜一莖草來云古人道了也毛羽相似去又云一草者祗是明得不變異也師曰祖佛不知有狸奴白牯却知有曰為甚麼狸奴白牯却知有曰祗是百無所解云祇如祖佛為甚麼不知有云祖為執印佛為相似云祇如狸奴白牯知有個甚麼云祇知有狸奴白牯云如何是狸奴白牯知有底事云不從西東來不從三十二相問如何是祖云上有云如何是佛云相似去四種異類一者往來異類者如今一切聲色言語階級地位捨父逃逝盡皆却向上祖又得為異類又天堂地獄餓鬼畜生修羅等皆是異類二者菩薩同異類者先明自己然後却入生死異類中攝他已證涅槃之果不捨生死類自利利他願一切衆生皆成佛從末後成佛所以大權菩薩若不先化衆生己事無由得成辦故南泉云先過那邊知有却來遮邊行李菩薩具六度萬行教云若有一衆生未度者吾終不成正覺誓願無邊衆生無邊如是誓願故名菩薩同異類三者沙門異類者先知有本分事了喪盡今時一切凡聖因果功行始得就體一般名為獨立底人亦名沙門稱斷事始得表裡情忘三世事盡得無遺漏得名佛邊事亦云一手指天地亦云具大沙門轉却沙門稱斷邊事不入諸聖報位始得名為沙門行亦云沙門轉身亦云披毛戴角亦喚作水牯牛恁麼時節始得入異類亦云色類邊事所以古人道頭長三尺項短二寸祇是這個道理不得別會四者宗門中異類者如南泉云智不到處切忌道著道著則頭角生喚作如如早是變也直須向異類中行道取異類中事洞山云此事直須妙會事在其妙體在妙處曹山自道此事直須虗一位全無的的也覿面兼帶始得若是作家語不偏不正不有不無呼為異中虗此事直須作家橫身逢木著木逢竹著竹須護觸犯囑囑囑囑有人問余如何是異我若向儞道驢年得異麼所以有人問南泉百年後向甚麼處去泉云山下檀越家作一頭水牯牛去云某甲隨和尚去得否泉云儞若隨我含一莖草來師云此水牯牛不同沙門水牯牛直須子細始得不迷時候問如何是往來異類師云未知有自己又云一切言語聲色是非總是往來異類云如何是同中異類師云不擇其身云如何是披毛戴角異類師云不立觸淨又非時答觸即觸遇淨即淨云如何是宗門中異類師云要頭則斫將去得無遺漏始得通身始喚作一塵一念十方婆伽梵一路涅槃門到恁麼時節不處正位不擇其身却入異類中披毛戴角無異念故云一切物類比況不得諸佛諸祖計校不成所以古人道沙門邊語不得將尺寸語與人故喚作勝句妙句此是色類邊語三者一切所有底物比不得始呼為勝句妙句所以古人道千般比不得萬物況不成智者不能知上根亦不識亦云本來無相似故勝句妙句勝句妙句者天上人間測度不得底事借此為語類邊説行稠布衲問如何是色類師云披毛戴角云如何是語類師云曹山只有一雙眉又問如何是水牯牛師云朣朣云此意如何師云不知有天地上座問雲居先師有言自少養一箇兒子頭長三尺頸短二寸如何是自少養得底兒子師云日給難忘云如何是頭長三尺師云不奈何云如何是頸短二寸師云至今還奈何得否云如何是日給難忘師云常在則是云如何是常在師云不違背則是云如何是不奈何師云到恁麼時甚麼人奈何得云至今還奈何此意如何師云三世諸佛不奈何云如何是頭長三尺頸短二寸師云不是從來底事問沙門行個甚麼行師云畜生行云如何是畜生行師云披毛戴角云如何是沙門行師云物物不間斷云不間斷底事如何師云始得行云如何是披毛戴角底人師云不懼業云為甚麼到恁麼地師云若不懼業甚麼處不到問從凡入聖則不問從聖入凡時如何師云水牯牛云如何是水牯牛師云朣朣云此意如何師云但念水草餘無所知云成得個甚麼邊事師云祗是個逢草喫草逢水飲水師又云這個語有力欲知有力此人不報沙門邊事亦不入諸聖報位便是入異類此異類是披毛戴角喚作沙門行亦喚作沙門行李處亦喚作頭長三尺頸短二寸欲知此意到沙門行時不欲將尺寸分親踈不得説張三李四又頭長三尺者只得從小至大今日功成得到恁麼時喚作勝句妙句頸短二寸者是不坐沙門位亦不處諸聖報故為頸短二寸恁麼時不得説著稱與不稱所以道不將尺寸來向這裡思量也雖然如此猶是類邊事須知有異類中事不見道知不到處不得説著説著即頭角生喚作如如早是變也須向異類中行喚作虗一位喚作覿面兼帶全無的的云如何是類師云披毛戴角云如何是異師云作麼作麼云如何是行師云要頭則斫將去云只如異類成得個甚麼邊事師云此事有二種異類一者沙門異類二者事上異類事上異類者狸奴白牯是也沙門異類者觸處得自由始得不變易不同那個師曰此不變易事有二種一者人人盡有本分事二者知有底人不捨一切聲色是非於一切物物上不滯呼為一切處不易亦喚作披毛戴角亦喚作入泥入水亦喚作行李底漢云如何是入泥入水師云不變易云轉身也否師云不轉身云此人屋裡事如何師云諸聖測不得云為甚麼測不得師云是伊不同諸聖云此猶是類邊事還有向上事否師云有云如何是向上事師云向汝道則恐落類邊去好玉無玷雕文喪德豫徘徊同州江府萬年山請豐之僧林芳禪人祕顯訣盥手拜寫而守持年於茲矣於旦於莫雖好見此書尚未能啖其理味空飢矣頃依同袍同衣示教欲鋟梓止抑以此書我宗極致也往古雖傳聽其號於叢林又未見於茲書夥惜哉習鑿齒曰粃粳在前者乎將見鈔我朝種月禪師此書兩卷而雖抄録彼師之鈔前後大略才存十一二矣疑月師所見非元晦然禪師之本乎又月與然師時世如何各可尋討也自恐今雖訓黠莫胡暗短不能證文字倒或漏落誤而胡亂指點且一字一點不加私意可知乞洽聞作者高明達士勿訝少心現大膽冀一一訂矣今我所急務者只在此書弘通若覽人不問或校合或點所不及而於世流通可謂百世洞曹千萬世洞曹祈禱祈禱延寶八庚申天中秋明月後武野葛西莊見性寺主淵龍污點
