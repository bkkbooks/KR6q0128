body:
  text: 門人後曹山慧霞編門人廣輝釋後學晦然補天童四借頌補曰此四明宏智禪師頌及提唱語句頗多衡鑑故并録之餘亦例此蘋末風休夜正央水天虗碧共秋光月船不犯東西岸誰信篙工用意良借功明位六戶靈通路不迷大陽影裡不留機縱橫妙展無私化恰恰行從烏道歸借位明功識盡甘辛百草頭鼻無牽索得優游不知有却成知有始信南泉喚作牛借借不借借霜重風嚴境寂寥玉關金鎖手慵敵寒松晝夜無靈籟老鶴移栖空月巢全超不借借又上堂云同中有異功忘就位異中有同在位借功一步密移玄路轉全身放下劫壺空隱隱密密玲玲瓏瓏記取深雲須變豹自然死水示藏龍又上堂云只個家風八面玲瓏斗柄橫而河淡多鶴起而巢空功中退步就位位裡轉身借功靈靈了了處同中有異湛湛澄澄處異中有同隨宜也機輪宛轉妙應也關棙虗通所以道佛子住此地即是佛受用經行若坐臥常在於其中諸禪德且道其中事作麼生良久云萬古碧潭空界月再三撈摝始應知又小參舉僧問九峰祖祖相傳至分夜燈師云人人具足個個圓成有時點則不到我也為儞不得有時到則不點我也障儞不得諸禪德明中就位脫盡廉纖暗裡借功却添光彩還相委悉麼蒼龍蛻骨月轉夜玄豹變文雲弄暗又小參云衲僧家做得妙田地自然穩密受用不妨蕭灑有底如俊打鳩相似打著打不著便恁麼去有底如鈍猫候鼠相似候著候不著只恁麼守直饒打得著候得出若體若用自然有箇省發處所以溈山問仰山終日只聞子聲至和尚只得其體兄弟得體底人在裡不被寂囚得用底人在表不被物礙自然成一家去方知在體時體中得用在用時用中得體所以道借功明位用在體處借位明功體在用處且道總不借借時如何偏正不曾離本位縱橫那涉語因緣又揀云亦有功勳中兼帶似向上事臨時辨取如落淨妙之處則須知有事在要去則去要止則止千萬宛轉不得莽鹵一本莾鹵下云夫問答兩家語勢相報皆不出五位也但語有粗細答有淺深所以先師於非言句中強以言皆為對緣而設斯要耳如大無明底人為全體不同闡提闡提則知有事却挽雖挽却成孝養挽者不存祖佛及自己本分父母也紅爛底人為不歸全擔荷不立至尊大保任底人為刺腳入泥裡非小小護持釋云功勛中兼帶者如徑山問馬師十二時中什麼物為境師云欽闍梨却須問取曹溪始得又問洞山十二時中如何奉獻山云無物此例亦多子細看尋補曰通録曹山上堂僧問如何是大闡提人師云不懼業僧云如何是無明人師云始終不覺悟僧云此二人誰在前師云無明者僧云闡提人為什麼在後師云向去者僧云恁麼則無明者不從今日去也師云是僧云既不從今日去無明從何處來師云光處不敢入僧云豈不是不明不暗師云是僧云正恁麼時如何師云不受觸師復曰闡提有多種一類者是殺父害母出佛身血破和合僧毀壞伽藍此剋定實報受種種苦一類者亦所作如前此則為殺無明父貪愛母不信有佛法僧可破有伽藍可壞計為業心所得故墮情有亦受種種虗妄果報如前升降不同一類者知有自己本來事呼為父母不因外得無修無證非因非果不因師受不從證行所得不起父見曰殺不起母見曰害即是一切本分事不取不存故曰殺害才有纖毫奉重得味不成知有自己事也故曰大闡提以此動撥妙力即是從上宗乘體㞧家事承當要截玄道破諸迂曲即如新豐老人所玄示也補云前二與楞伽同烘爛底人者釋云有僧辭藥山歸鄉去藥山問有一人遍身烘爛臥在荊棘之中僧云恁麼則學人不歸去藥山云但知歸去與儞休糧方問如何是休糧方山云每日上堂不咬破一粒米也曹山云只如古德有云遍身烘爛底人祇是醜陋底人一切人近不得無拈掇處更道臥在荊棘之中只道在如今日用也亦無作拈掇處護持保任邊事遮裡更有一問一答問曹山遍身烘爛時如何山云荷負云荷負什麼人山云勿烘爛到闍梨又問醜陋人與滿身烘爛底人阿郍個是重山云大醜陋底人重頌曰遍身烘爛是何人荊棘為家誰敢親欲識但將休料藥直須護取本來身大保任底人者釋云曹山舉問僧大保任底人保任個什麼自代云終日在背後不曾著有人問雲岩保任底人與那個是一是二岩云如一機之絹是一段是兩段此例語甚多不能具舉也他智上座臨遷化時向人道雲岩不知有我悔當時不向伊說雖然如此且不違於藥山蔡子釋云此語有兩義直須子細看一者道吾共雲岩在藥山時吾先入方丈黑處侍立次雲岩問藥山南泉有言喚作如如早是變也須向異類中行如何是異類中行山云今日勞倦不能向儞說且去明日來此時道吾先出來後雲岩出來道吾問適來問什麼事岩具舉似道吾吾云和尚道什麼岩云不與我說吾當時咬齒便休所以道吾云雲岩不知有不知有者只是異類中行不可道不可知有宗門向上事是故云不違於藥山言紹繼也作蔡子者謂嫡子也此是虗言不是郍個也又然且不違於藥山者有人云此語屬道吾道吾意者雖不向伊說然我且不違於藥山也不違者不辜負也此語一時舉明二先德密意也一者道吾云不知有者此是道吾舉唱之語却存其不知有又明異類中行所以問雲居雲岩不知有此意如何居云不可得不可有約雲居助明其不知有之事也我悔不向他說然且不違於藥山者此是道吾獨自保持之語也補曰蔡子連上談而智自謂耶連下而謂旁人耶各有其說無左文闕疑看他智上座合作麼生老婆也釋云此語有二意一者刺其道吾二者讚道吾道吾讚語却當也南泉云異類中行釋云言雲岩不知有此行也且密闍梨不知有釋云此是權借之言也蓋覆前語也近代有人云此事是密也汝等諸人不知有闍梨者都呼乃未曾親近師匠臆斷圖度之說也方鑿圓孔即此言老宿舉吾病時雲岩遣密師伯問疚次說此事因此師伯却問道吾云且密闍梨不知有此是道吾止遏之言也又曹山云有人問雲岩如何是南泉異類中行答云不得說著說著則損著說底人此是先師答異類中行語若不知有爭解恁麼道據彼雲居與曹山之語實為舉唱其中不知底之事緬惟雲岩大師藥山襟喉之子新豐膽仰為師若不通異類中行爭能作人化主禪門學者可不詳頌曰獨舉南泉異類行也曾問決被人輕莫言戴角披毛子且聽當時告報聲先曹山本寂禪師逐位頌并注別揀補云此題乃霞公白眉所置也故其序亦云曹山大師新豐嫡嗣將明五位頌出五篇輝序亦云制頌排章若獲神珠出海云云且曹山父子是傳家兒孫自有相承旨訣則是先曹山之作必矣而林間録洞山作五位君臣標準又作偈系其下云又諸録皆云洞上逐位頌其說不同如此未敢詳定雖然豈可以數百年外後賢傳記為是而以家之所傳為非今且以此録所載為正正中偏三更初夜月明前揀云里白未交時辨取又云萠芽未生之時又云只今是什麼時又云此中無日月不說前後去也莫怪相逢不相記揀云忘却也又云就也又作麼劫中違背來恁麼則俱拱手去也隱隱猶懷舊時妍揀云此兩句一意終不相似又云圓也又今日重什麼又恁麼則不自欺得偏中正揀云緣中會也失曉老婆逢古鏡揀云露也又適來又記得又是什麼模樣又云恁麼則別不呈色分明覿面別無真揀云即今㞧也又云只者個便是也又云失又恁麼則未有真時較些子爭奈迷頭還認影揀云不是本來頭又莫認影即是又終不記得又恁麼則改不得也正中來揀云過也無中有路隔塵埃揀云無句中有句又云相隨來也又從來事作麼生又恁麼則不相借也但能不觸當今諱揀云傍這個又云早是傍也又云自是一般人又云恁麼則盡大地無第二人也也勝前朝斷舌才揀云非默又云更切於這箇又終不切齒又云恁麼則叮嚀不得者補云林間録云無盡居士嘗向豫曰悟本大師作五位君臣偈其正中來曰但能莫觸當今諱也勝知朝斷舌才先德之意雖明妙挾然知朝斷舌必有本據而言前古無斷古事矧又曰知朝尤無謂也將非后無傳録之誤耶豫曰舊本曰也勝前朝斷舌才意用隋賀若弼之父敦為宇文護所忌害之臨刑戒之曰吾以舌死引賀若舌以錐刺之出血使慎口隋興唐之前前朝刺舌非知朝明矣然斷舌刺舌意則同耳無盡屬豫記之偏中至揀云有句中來兩刃交鋒不相避揀云主客不相觸又云彼彼不傷也箭箭相柱脉脉不斷又云不相敵者又恁麼則却不相管好手還同火裡蓮揀云壞不得又云誰是得便者又云弱於阿誰又恁麼則終不作第二人也宛然自有冲天意揀云不從人得又恁麼則不借也又云非本有又恁麼則己亦不存又云非己有兼中到揀云妙挾不落有無誰敢和揀云不當頭又云他是作家又云正好商量喚什麼作商量道將來云問人人盡欲出時流揀云皆欲出類又云有什麼出頭處又動則死又恁麼則隨處快活也折合還來炭裡坐揀云即可知也將知合作麼生又云謾他不得又恁麼則賴得是某甲補曰凡此五位之立名先後有多不同如曹山室中録僧問五位中何位對賓師云汝即今問那個位僧云某甲從偏位中來請師正位中接師云不接僧云為休麼不接師云恐落偏位中去師復問僧只如不接是對賓是不對賓僧云早見對賓了也師云如是如是又揀云此位中事總就正位為主若是正位中兼無言說亦無對賓底道理若是對賓偏位極則處呼為對賓也若是兼帶等總是臨時索喚不同或時對或時不對亦呼為有語中無語無語中有語廣如偏正位中所明更有不入偏正位子語方難為人須是明眼底人始得不受指東劃西又僧寶傳載有僧問曹山五位君臣旨訣山云正位即屬空界本來無物偏位即色界有萬形像偏中至者捨事入理正中來者背理就事兼帶者冥應衆緣不墮諸有非染非淨非正非偏故曰虗玄要道無著真宗從上先德推此一位最妙最玄要當詳審辨明君為正位臣為偏位臣向君是偏中正君視臣是正中偏君臣道合是兼帶語問如何是君曰妙德尊寰宇高明朗大虗又問如何是臣曰靈機宏聖道真智利群生又問如何是臣向君曰不墜諸異處凝情望聖容又問如何是君視臣曰妙容雖不動光燭本無偏又問如何是君臣道合曰混然無內外和融上下平又曰以君臣偏正言者不欲犯中故臣稱君不敢斥言是也此吾法之宗要也釋云五位者一正位不涉緣也二偏位涉緣也三偏中正兼緣施設皆歸正位故也四正中偏正位不獨立須假偏位現故五相兼帶來云云此與白眉序同廣燈録云汾陽昭禪師遍歷叢林洞達玄旨因與戒禪師語及曹洞機要遂云五位參尋切要知纖毫才動已相違金剛透匣誰能用唯有那吒第一機舉目便令三界靜振令還使九天歸正中妙挾通回互擬議鋒鋩央却威師頌畢有僧問如何是正中來師云旱地蓮花朵朵開學云開後如何師云金藥銀絲承玉露高僧不坐鳳凰臺問如何是正中偏師云玉免就明初夜後金雞須報五更前問如何是偏中正師云毫末成大樹滴水作江河問如何是兼中至師云意氣不從天地得英雄豈借四時推問如何是兼中到師云玉女拋梭機軋軋石人打鼓響因僧請益逐位頌出正中來金剛寶劍拂天開一片神光橫世界晶輝朗耀絶塵埃正中偏霹靂機鋒著眼看石火電光猶是鈍思量擬議隔千山偏中正看取輪王行正令七金千子總隨身途中猶自覓金鏡兼中至三歲金毛牙爪備千妖百怪出頭來哮吼一聲皆伏地兼中到大現無功休作造木牛步步火中行真個法王妙中妙慈明和尚頌正中偏半夜烏雞室裡鳴海底然燈光世界石上栽花長枝靈偏中正日落西山觀異影分明景像顯宗乘休把迷頭窺月井正中來木馬生兒遍九垓進退任行通鳥道豈並巢居界內隈兼中至彼彼丈夫全意氣矛頭交互不傷鋒展拓縱橫不相離兼中到黑白已前休作造須明露柱未生兒莫認狂辭途蹃走都頌偏中歸正極幽玄正去偏來理事全須知正位非言說朕兆依俙屬有緣兼至去來興妙有到兼何更逐言詮出沒豈能說世界蕩蕩無依鳥道玄大陽楷五位答問大陽楷禪師因僧問如何是正位師云言前不布彩一句是非前如何是偏位師云萬仞峰前卓五彩如何是正中偏師云夜半不須問戶牖暗中誰辨𨓏來源如何是偏中正師云天曉便藏無影木依俙兆象露雲遮如何是兼中到師云他家自有通心在曲新終不落今時道吾真五位答問道吾真因僧問如何是正中來答云皎潔乾坤震地雷如何是正中偏曰諸子投來見大仙如何是偏中正曰萬水千山明似鏡如何是兼中至曰施設縱橫無所畏如何是兼中到曰黑白來分已前過則之禪師五位頌正中偏日下朝南斗東山水上行閏年時候晚天曉報三更偏中正頭角初彰現誰尋異路行將軍堂上老臥聽凱歌聲正中來切忌當頭語高深玉殿開舊時行李處宿雨長莓苔兼中至自古知音少而今莫問渠口方眉剔起閉却五天書兼中到覿面無阿曲清風觸袖寒花開枝木上著意大家看天童覺和尚頌正中偏霽碧星河冷浸乾半夜木童敲月戶暗中驚破玉人眠偏中正海雲依約神山頂歸人鬢變白垂絲羞對秦臺寒照影正中來月夜長鯤蛻甲開大背磨天振雲羽翔游鳥道類難說兼中至覿面不須相忌諱風化無傷的意玄光中有路天然異兼中到斗柄橫斜天未曉鶴夢初醒露氣寒舊巢飛出雲松倒又小參僧問如何是正中偏師云天共白雲曉如何是偏中正師云水和明月流如何是正中來師云莫道鯤鯨無羽翼今日親從鳥道回如何是偏中至師云當機不回互覿面無後先如何是兼中到師云寶殿無人不侍立不種梧桐免鳳來五位已蒙師指示向上還更有事也無師云有如何是向上事師云乍可截舌誰敢當頭妙喜示衆妙喜示衆云又有一種以偏正回互為宗旨以黑白圈兒作五位形相以全黑圈兒為威音郍畔父母未生空劫已前混沌未分事謂之正位以二分黑一分白圈兒為正中偏却來白處說黑底又不得犯著黑字犯著黑字即觸諱矣更引洞山頌曰正中偏三更初夜月明前謂能回互只言三更三更是黑初夜是黑月明前是黑不言黑而言三更初夜月明前是能回互不觸諱以兩分白一分黑圈兒為偏中正却來黑處說白底而不得犯著白底消息頌云偏中正失曉老婆逢古鏡不言明與白而言失曉與古鏡是能回互明與白字而不觸諱蓋失曉是暗中之明古鏡亦是暗中之明老婆頭白不說白而言老婆白在其中矣能回互白字故也又說正中來頌云正中來無中有路隔塵埃或云出埃謂凡有言句皆無中唱出便自挾妙了也無不從正位中來或明或暗或至或到皆挾挾通宗凡一位皆具此五事如掌之五指無少無剩兼中至謂兼黑兼白兼偏兼正而至何謂至如人歸家未到而至別業乃在途為人邊事亦能回互妙在體前兼中到謂兼前四位皆挾妙而歸正位謂之折合歸來炭裡坐是亦說黑處而回互黑字不道黑而言炭或者又謂曹山有言正位者皆空界也一向無物偏位者即色界也內有種種諸雜萬像兼中至者捨事入理正中來者背理就事兼帶者即冥應衆緣不墮諸有非染非淨無正無偏故云虗玄要道無著真宗從上先德推此一位最妙最玄須是審詳辨明當體又說五位皆三字成句偏正上下回互不犯中中即正位也說理說事教有明文教外單傳直指之道果如是否若果如是討甚好曹山邪只是口傳心授底葛藤既不如是且古人意畢竟作麼生妙喜為儞下個注腳也要諸方撿點不見汾陽道面目現前一任揀取故淨名云但除其病而不除法又首楞嚴云汝以緣心聽法此法亦緣古人一言半句雖是垂慈皆在未屙已前著到金師子云正位偏位正中來偏中至兼中到據上所說各有善巧之元真長老揀補曰此揀已被曹山所斥然今人未知始末抑亦不無長處故古本亦并録之要辨得失爾正位却偏亦圓兩意為問家未生曰偏恁麼時無人觸撥是兩意曰圓亦云主中主也如雲岩云獨脫物外起衆聖之前偏位雖偏有兩意是語中無語才有言語是偏雖偏為語中無語不觸是兩意亦云客中主也如問魯祖出息不依衆緣入息不居蘊界而住此意如何祖云有一人無出入息在此答顯語中異語也又為問家偏故答即當位故云圓矣或有正位中來者無語中有語問如何是祖師意云待特牛生兒即向儞說又云闍梨未問時某甲却記得闍梨才問著某甲忘却此無語中有語此語雖主家語亦賓主共用亦云主中主問某甲擬問道不得如何云我亦道不得此主客具足如洞山問雲岩未有陰界時還道得不無岩云儞今還有否此語為無語中有語也或有偏位中來者有語中無語問如何是玄旨云如死人舌又問什麼物恁麼來云說似一物即不中此賓主共用亦云客中主又有功勳語中無語問十二時中將何奉獻云無物又如問洞山先聖如今什麼處去也師云絶追游處去此答話中似功勳邊來故云有語中無語其實非功勳也此語獨來故云偏也或有相兼帶來者這裡不迷始得問光境俱亡復是何物云圓碣碣地若臨時揀得出亦喚作客中辨主亦有別因緣相兼帶來者不定凡是正位中來及論偏位中來兼帶來語中雖有主中主客中主親疏有殊亦屬偏位亦是傍語若臨時索喚來緊者抽之歸本位又百丈云離却咽喉唇吻道將一句來學人道不得請師道師云我不辭向儞道恐後人欺我兒孫雲岩云師今還有否師云喪我兒孫了也又如問洞山承和尚說刮骨禪請和尚四方八面刮云勿刮處云和尚幸是好手為什麼刮不得師云儞還聽道世醫拱手此為問家兼帶故答即當頭直現其事是以問答俱不觸著故云相兼帶來也大約而言問答兩家語勢相報皆不出兩意焉俱問語有粗細答有淺深所以洞山先師於非句中強以言也此為對緣設欺妙旨欲使後進之輩除疑遣惑識邪辨正知賓主次第達偏正之兩端矣寶篋論新補四明山大方廣圓覺寺自然述夫五位者洞山大師於接物中曲所標也但屬言教大約不出此五位焉或微妙旨也升洞山之堂入洞山之室者唯曹山矣大師知其應數是釋天之靈乃付以五位頌曹山以寶之尺璧寸金非羡也已曲為後學引先德旨教以證之曹山一人審之諦之餘皆混執一隅涉其意想矣吾曹明哲之友可諦詳之矣如其闒茸之者隨穩便說拂席而起者五千大師不制此乃退亦佳也此宗趣一一日月下罕遇一人耳未參後學叨親至友乃遙承先人示訓每見濫㞧此意者各生根解亦常痛於心髓不能已已略盡大要目之為五位寶篋論云耳正中偏者為主中主也但不涉緣宛轉不相觸事上道得如黑白未分時辨取得主中主也非賓中主也賓中主為對緣無語中有語是正中偏也就偏辨得喚作主中主也所以圓也皆是傍這物轉妙含其理不相觸也所以大師頌曰正中偏三更初夜明月前曹山釋云黑白未分時辨得則不涉緣㞧只如黑白已分時辨得不是主中主則涉緣是賓中主也喚作客中辨主莫怪相逢不相識隱隱猶懷舊日妍曹山揀云此句雖近不相似為主中主不對緣故相似則對是客中主雖對緣則不同功也如雲岩云獨脫物外豈衆聖之前如未有衆聖之前豈非黑白未分例也灼然曹山云甚諦之亦如黑豆未生芽時也此例甚多略舉大綱補曰凡此論中屢言事上者謂正中妙挾事也偏中正者此明涉緣不同功勳為從語中辨得無言語底所以却圓雖涉門頭不同從外入也為從一言下便明得雖小涉緣不同諸緣也如白衣拜相則是諸緣此假今日下斷送則涉緣玄妙大師云如王索寶器一鎚下便斷痕縫始得又還假第二鎚否云先斬自身然後誅九族且合作麼生石霜曰一日生下一日王亦云一撥當假一言撥儞之時是屬緣所以喚作緣便撥著了直過那邊承當得豈屬緣耶所以却圓如王宮生太子生下便在王宮且不從外入如一鎚下斷痕縫當假一鎚之時是涉緣斷痕縫然後豈屬功也然且不得認著這個非王本有之器故如王宮生下太子雖是王種未是王故大師頌曰偏中正失曉老婆至還認影此豈非認著這個也蓋涉緣是自今日悟王宮太子不可便稱王一鎚便斷痕縫不可認作王本有之器也一體兩義也蓋時節不同耳非親得洞山玄旨者餘其涉卜度意想爾如問大師如何是佛答曰非佛佛是緣為問處從緣故故亦從緣向儞道非佛斷送儞過那邊去有一般漢向舌頭上解喚作以楔出楔雖除得個佛又爭奈非佛何不可先師云如是便休也不可只空區名句也如一鎚下便須斷痕縫始得不可以楔出楔也這邊向儞道非佛撥儞向郍邊郍邊且合作麼生承當大難大難奉勸吾曹後學切須子細莫如盲驢信腳須向總未有十方一切諸佛與盡法界衆生已前㞧此處若妙得㞧自有語話分終無不解語佛不用學間言間句先德云但知心是佛何處佛不解語正位中來者為語勢從事上來也喚作無語中有語但傍這個轉不相觸也正位者蓋是一切諸佛及法界有情皆從此位流出猶如衆漚生於海水也為對緣故曲標正位也若不對緣且喚作什麼法身佛猶屬緣為變異故南泉云喚作如如早是變也須向異類中行問曹山如何是異云我若向儞道驢年得異麼又云異中不合類他與麼道還涉緣否又云黑豆未生芽時藥山云我有一句子未曾向人說道吾云相隨來也為語中妙叶事來故云相隨來也雪峰云儞入門時共儞商量了也國師云何不早問老僧此例甚多不能廣引奉勸吾曹後學第一諦明正位須向未有法身佛已前未有虗空已前未有真如法界已前體取法身是光摩訶般若是光無量壽是光一切含靈與金剛體悉是光且是個什麼光光未發時作麼生㞧光光盡屬緣若不對緣正位何舉猶如空中釘撅雖然如是作家不可無語也故洞山頌曰正中來無中至斷舌才但屬緣盡是塵埃作家但傍這裡有語妙挾才則得不傷也傷則斷舌不語則如被生埋也審之補曰生埋事蓋用慕魄太子因緣見豈函本經偏中至者為語中妙含至理得不傷故亦是賓中主正中偏是主中主偏中正是賓中主正位中來是獨脫來也不論賓主耳偏中至亦獨從偏中妙叶不相觸也作家相見如兩刃相向劍刃上安立性命不相觸也個中不是好手便是喪命所以作家相見不可無語故頌曰偏中至兩刃至冲天志為語來勢不隨偏故中含無語分明滿口道不生痕朕故無縫罅從者邊過郍邊故亦云語中無語也如石霜云三隻骰子拋不落湧泉云無人得渠危又云不掛寸絲石霜云他無出入息仰山云兩口無一舌此例甚多兼帶來者不涉偏正二途此位似玄路中而無玄路也蓋是語勢全不立的虗空相似呈之不著為至妙也如藥山見遵布衲洗佛乃問曰者個從儞洗還洗得郍個麼曰把將郍個來師乃休又藥山帶刀道吾問背後底是什麼山驀口研又問今日供養羅漢還來也無答曰儞每日噇什麼等是其類也此例甚多喚作兼帶全無的的只如者個物還的的麼若也的的則屬物類也古人云千般比不得萬物況不成然雖如此不得一向不的的所以洞山頌曰兼中到不落至炭裡坐且畢竟有人得此妙否還待的的否細詳之無令卜度墮於意思也大凡語勢亦不可一向執一隅如待特牛生兒了我即向儞道又如空中鳥道此不可以五位中辨乃是玄學路來也不同龜毛兔角者蓋是古談者個物如是妙之最妙也不同虗空又不同水中月也蓋別是一格妙談而教中舉喻摩尼珠在天即清在人即濁若以五色裹之則作五色若置水中則作水色體非五色此蓋古人通㞧個物性如傅大士云未曾暫有全體現前雖乃現前難追難訪又如當今世尊悟道偈云因星得悟悟後非星不隨於物不是無星物體妙爾若向此輩明得漸可撥入正位也大凡今人文字事處見只解尋苗不解從根辨只如承根得活則青黃有異花卉多端如佛果般若涅拌法身等類至於生死煩惱有情無情等色色不同乃至言教布義深淺若解向根下覷得則苗無不曉也如蜀中和尚云我若一向舉唱宗乘稠嶺內路須荒此談正位也然後學者諱喚作正位蓋為不向根下㞧只一向從苗作玄學㞧耳如石霜云斥其心意忌說見聽至於法身佛是見聽此撥後進入正位也只如離見聽合到什麼處岑大士云三世諸佛共盡法界衆生是摩訶般若光也光未生時作麼生委此乃從根下擺撼也如此徹人日月下其數幾許也若非徹明即大難也奉勸吾曹直須子細研決須作師子吼莫作野干鳴奉囑奉囑安國和尚寶篋論竟
