front:
  text: 重編曹洞五位序傳付守澄上主雪岑詳夫石頭一派源乎曹溪浸潤四世至于洞山其流始大盈科洋溢而有條不紊自大師謝世世五傳而到于大陽機法未融斯道寂寥賴慈濟塔開異苗間出激濁淮舒以結懸絲之寄流芳襄郢能迴既倒之瀾及其大漸童嶺渦漩四明流乾盪坤坱軋無限焉則其前後波及海東者特彼餘沫耳是以宗徒尠有得其醇全者然有新羅金藏靈岩清虗雲住嶽須彌儼無為微燕口慧虗鳳湛大嶺清院臥龍海龍瑞岩洎岩比現於典二十許員尊宿是醇乎醇者也各自問津津會返魯魯變故得正中妙叶行于青丘者其來尚矣迨后昆洞陳其五膠柱刻舟使一味澆漓之甚人或面之以莖草禪謂涉意想置之閫外或溟涬然望涯而退噫廣陵散幾乎絕矣豈不曰兩刃交鋒電火難追動成窠臼差落顧佇何甞誤人落意思血指汗顏哉恚婦謗沈無香故人飲乳成毒斯有徵矣且觀价之垂範固難擬議雪峯是一千五百人善知識九嚼屠門而染指雲居是妙光幻有東土七生大宗師再投爐韛以請槌況其獰焉者乎匠民云亡操斧失措海印沈輝按指不妙苟一月之未窺則三舟領略有執指之迷一源之不復則九流扶疎有殊致之惑致之不一指之不忘良導之憂也斯曹山所以種種指注而不辭也霞以編之輝以釋之此錄之所以行也而辭語糾纏尋究稍難比有普法禪師老謙得宋本重刊又拾曹洞之遺文并疎山末山二家語訣排為下篇𢞎其不甚詳過致多乖謬為失不淺甞自介懷曾謁曹溪小融和尚語及曹洞家世和尚亦以此云慨然流嘆者再三然未暇一二諮稟噬臍無及矣心竊自謂遇幸因緣心須改正值世多難未償素志越丙辰夏寄錫輪山吉祥菴因有餘閑乃將舊本三家語句務便檢閱錯綜其辭隨門夾入依舊離為二冊以備童蒙之求同袍之上人素觀之懼藁本之或泯切有刀梓之請予曰嘉矣庶憑法水之清一洗障之茂子其圖之凡揀云者曹山語也釋云者輝語也二文前後詳略不同者取詳去略兩通者俱存之但文有前却豈涉胸臆至於闕注不釋處補以短聞如支敏度首楞合文杜亢凱麟經夾傳豈喪彫文實全半璧摸影厥蹤涓塵足壑庶幾尋流得源掬海識川新豐老人免其墮地爾中統元秊實沈臈八遺鳳笑軒晦然序洞山五位顯訣并先曹山揀出語要序門人後曹山了悟大師慧霞述西祖持來花一真而截名相南華圓去果五葉以散師承迨及新豐宏提綱要圓融一句分列五門洎曹山大師乃新豐嫡嗣將明五位頌出五篇兼舉一例之言以顯五門之旨一者正位為之主二者偏位為之賓三者正中却偏是恁麼來而顯位四者偏位却正是恁麼去以明宗五者相兼帶來不涉有無頓亡賓主不偏不正至妙至玄或當頭而來寧從語默或正面而去豈在言詮如藥山帶刀布衲洗佛逈絕教中之則卓然格外之機誠出常途全超異路永言宗旨此位最玄其有借位明功備功明位從緣辨正體妙知歸廼至玄談咸標位次因披旨要敢有序題矣重集洞山偏正五位曹山揀語并序門人廣輝述敘曰甚奇世尊於無言說法能以言說建立一切法此是至人說教方便之門後代師承高山仰止也偏正五位者洞山大師之所作也大師法界醫王宗門化生凡有一言一句皆為入髓入神略開方便之門爰制偏正之位其言約其理深天不高海不濶若不曾參祖室誰能測彼津涯次有曹山大師者新室之人也早通真理復遇明師親授其文密傳其旨不欲墜於師道見示學徒上智之人一隅易曉中庸之士三復難明於是制頌排章若獲神珠出海隨文解釋如窺明鏡照人盖謂父作之子助成其事也於是決釋之者旦夕不同飽去飢來控門非一揀出由其先後言詞從此重繁若知樞要之門易通徑直之路未達綱宗之趣長迷言句之中廣輝南北尋參二十餘載每因師友仰訪真宗忽披偏正之文稍識先賢之迹實是玄門話柄堪為暗室燈光然以明匠對機省言施設凡將提昌略舉一隅在於耆學之徒足知樞要或有晚生之子莫曉旨歸具錄諸宗續申管見久參作者明𭥑道人或有差當請垂匠手云爾重編曹洞五位顯訣五位顯訣凡例卷上洞山五位顯訣揀釋補附六借卷中天童四借頌逐位頌汾陽五位答問并頌是至下閑居士曹洞贊附例慈明和尚頌大陽楷五位答問道吾真五位答問則之禪師五位頌天童覺五位頌妙喜示眾元真長老揀五位五位寶篋論卷下洞山三句附百文三句寶鏡三昧汾陽廣智歌心聞賁曹洞宗派頌閑閑居士曹洞贊曹山三種墮四種異類凡例終
