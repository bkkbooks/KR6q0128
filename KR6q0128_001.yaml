body:
  text: 門人後曹山慧霞編門人廣輝釋後學晦然補洞山五位顯訣補曰善卿云价初住新豐晚遷洞山大駕其道立偏正五位為當時首唱今此亦云洞山顯訣則五位之設始自洞山是天下之通論也是以寶鏡三昧歌與玄中銘雪子吟綱宗三偈等詞語多相同皆出於悟本無疑矣而僧寶傳云曹山欲辭洞山山云三更當來授汝曲折至中夜授章先雲岩所付寶鏡三昧五位顯訣三滲漏又贊曰寶鏡三昧其詞要妙雲岩以授洞山疑藥山所作也先德懼屬流布多珍秘之但五位偈三滲漏之語見於禪書據此則三昧顯訣逐位頌三漏等文皆似出於藥山與此不同以何為正今以管豹窺之寶鏡顯訣三漏之旨雖皆稟於藥嶠至於着文設位流布叢林則創自洞山故天下稱洞山五位又親承克家曹山父子皆云洞山顯訣此為明證何必惑於後來之說乎但祖上秘之慮成路布洞山大開戶牗無嫌底法遂乃立名定位施設不疑耳故云顯訣意可知矣或云寶鏡三昧是藥山之作餘皆洞山相承而述父基子構其殆庶幾然藥山門下有二宗途道吾下至於石霜末山即九峰也而去多以君臣父子用之雲岩下至於曹洞父子而來多以偏正用之而兼含君父若使寶鏡三昧藥山已有正偏回互三五之說者秘於智而不傳獨私於晟使家風乃爾不同何哉又洞山不合得首唱之名是可疑也然則寶鏡之作闕疑可也至於顯訣三滲漏則悟本之囑耽章彰彰矣寶傳中含胡為文致生疑豫惜矣正位却偏就偏辨得是圓兩意曹山揀云正位却偏者為不對物雖不對物却具輝釋云却具者具用也別時揀云正中無用為偏全用為圓是兩意問如何是全云不顧者得底人也此正位不明來也若佛出世也恁麼若佛不出世也恁麼所以千聖萬聖皆歸正位承當釋云不顧者此明具圓用也又就偏辨得是圓兩意者偏中辨得正位故云全就偏辨得其正位故云圓偏正一一位具兩意偏正雙圓體用俱全故云兩意凡有涉緣言句呼為用也又別揀云夫先師所明偏正與兼帶等用先師本意不為明功進修之位兼涉教句直是格外玄談要絕妙旨祇明從上物體現前冥叶古聖之道今見諸學士詮揀先師意度似有誤彰不免聊為敘其差當媿在不混其功於中或有借位明功借功明位緣緒多端功在臨時看語來勢不負來機妙在佳致爾補曰甞閱廣弘明集講肆諸釋氏皆稱學士如云今學士如林又妙玄云學士光統云云借功借位等釋文見下揀云正中偏却具此一位第一不得動着釋云洞山到田畔有師僧插田有一僧倒插山問闍棃因什麼倒插對云心中活在師不言歸院翌日眾僧普請出次日先出候問昨日倒插田僧出來其僧末後出門山問闍棃昨日東園斫竹者誰其僧罔測云不知山云闍棃什麼處人云鄧州人山云老僧行脚時曾往過來又偽山大眾作田次山出門擬往作田處恰遇仰山從田中上來山問田中多少人仰山便插鍬子側立山云今日南山多有人刈茅此等語例不常用也子細詳之揀云如學士揀獨脫物外起眾聖之前云是正位却圓其實屈正位也此例語是古人道過跡尚存猶未得語中無語此復呼為非正位也為語中有語故此可呼為有病兼帶不得呼為相兼帶來耳釋云此是曹山貶真和尚之語若非深契玄樞誰敢辨其邪正一字褒貶萬古明規獨脫物外語者來從肇法師論云理為神御獨朗眾聖之前百丈云我有語獨脫物外起於眾聖之前雲岩因舉此語云我道獨脫物外豈眾聖之前此是雲岩助明提舉之語所以起豈兩字各有來由玄學之徒須知的意補曰正位之名非局於洞上元自乘教如維摩經云若聲聽人未入正位食此飯者得入正位然後乃消已入正位食此飯者得心解脫然後乃消華嚴離世間品云菩薩摩訶薩以一切空為所住處善巧觀察故以無相為所住處不出正位故云云起信論云此體用熏習有二種云云釋論云一者未入正位二者已入正位云何為未入正位者謂十信凡夫一切二乘三賢菩薩未得正體智不證如理故如本一者未相應謂凡夫二乘初發意菩薩等以意識熏習依信力故而修行未得無分別心與體相應故未得自在業修行與用相應故云何為已入正位謂十地菩薩內得正體智外得後得智一分智用與如來等唯本熏習力自然修行增長真如能滅無明故如本二者已相應謂法身菩薩得無分別心與諸佛智用相應唯依法力自然修行熏習真如亦滅無明故岩頭大師云一個力在轉處猶如氷上葫蘆子等閑蕩蕩地按着便轉若是正位中來不合着規摸餖飣伊喚作恁麼時一物不思亦云正句湛湛地亦云孤峰亦云頂王偏位雖偏亦圓兩意緣中辨得是有語中無語揀云為用處不立的不立的則真不常用也釋云偏位雖偏亦圓兩意者為緣中辨得是有語中無語也為用處不立的不立的則真不可常用也偏正雙現故云圓兩意也又緣中辨得是有語中無語也者謂涉緣明妙借句現體又用處不立的者雖就用中明為語中不傷又揀云偏位雖偏亦圓者用中無物不觸是兩意雖就用中明為語中不傷此乃竟日道如不道一般又云偏位却圓亦具緣中不觸釋云用中無物不觸兩意者賓主兩意不觸也洞山問僧儞名什麼僧云請和尚安名師却稱良价僧無對雲居代云恁麼則無出頭處又云恁麼則總被和尚占却也又看上𤵙來禮拜洞山洞山云來作什麼𤵙云不為和尚來山云若禮尊者某甲則偏坐曹山云若禮尊者者此明正面而去某甲則偏坐者此具兩意一識渠知有二識渠不當頭云如何不當頭云不為和尚來是也或有正位中來者是無語中有語揀云正中來者不兼緣如藥山云我有一句子未曾向人說道吾云相隨來也此是他妙㞧得如湖南觀察使語此例甚多事須合出不得混尊卑呼為無語中有語又我有一句子未曾向人說此問答家須就出不得乘角乘角則不知有故釋云雲岩問道吾藥山最後云我有一句子未曾向人說如何吾云相隨來又有人問雲居相隨來者意如何答說了也如湖南觀察使語者百顏和尚問洞山從甚處來山云湖南來顏曰觀察使姓什麼此問正位中事山云不得姓顏曰名什麼山云不得名顏曰還理務也無此問偏中事山云他自有郎幙在顏曰還出入否山云不出入顏曰豈不出入山拂袖出去來日參退百顏自下僧堂前問夜來新到在什麼處山稱名良价顏曰夜來賺進一轉語直得一夜坐臥不安請闍棃堂頭喫茶去來茶罷顏曰請闍梨別為老僧下一轉語山云請師舉顏舉前語云不出入山云太尊貴生顏喜曰三十年住山今日方遇一人同道闍梨若在當山過夏老僧足可依栖此例甚多事須合出不得混尊卑呼為無語中有語也又揀云句句無語不立尊貴不落左右故云正中來也正位來明正位不涉緣文引語例者如黑豆未生芽時作麼生又如云有一人無出入息又云未具胞胎時還有言句也無十方諸佛出身處也此例喚作無語中有語釋云王侍郎問三平黑豆未生芽時作麼生平云諸佛亦不知一句子未曾向人說前已明也有一人無出入息者道吾問石霜云有一人無出入息速道將來霜云不道吾云因何不道霜云不將來又問魯祖出息不依眾緣入息不居陰界而住此意如何云有一人無出入息又南泉云未具胞胎時還有語也無此是南泉提起之語也有人舉問雪峰峰云道有道無則喫三十棒又問松慶慶云從他自道又舉問曹山山云有云請和尚傍瞥云將什麼物聞云聾者還聞也無云聾者若得聽則具耳目云什麼人得聞云未具胞胎者此例亦多喚作無語中有語也又洞山云今時學者欲得學直須躰取佛向上人始得如今學者只知有十方諸佛且不知有十方諸佛出身處空知有佛不得成佛有人問投子如何是諸佛出身處子云惡人又有老宿云諸佛謾我道又云幾向闍梨道又揀云又有借事正位中來者此一位答家須向偏位中明其躰物不得入正位明也此一句要知先師問新羅僧未過海時在什麼處無對自代云祇今過海也在什麼處又如先師代慎徵長老出柱杖語云如今出也有人辨得麼此例雖緣中認得不同向去辨不得恐后人收落功勛將為向上事釋云兩僧在一處手把柱杖一僧指云這個柱杖出何處一僧云雪地出洞山不肯自代云如今出有人辨得麼又揀云諸學士云問祖師意答揀待特牛生兒則向汝道云此是正位中來此一例語切不得呼為正位中來可云玄學路中問答俱然也別是一路又不得呼為相兼帶為顯明故縱賓主回互祇得呼為有病兼帶釋云顯明者語中當明故也藥山云我有一句子待特牛生兒則為儞說有一僧黑處立云特牛生兒了只是和尚不說雲岩舉似洞山山云此僧却見道理只是不肯和尚偈曰無角特牛生得兒纔生頭角被人欺絕縫室內直須養莫使常流造次窺真和尚將却特牛語取入正位中來或有偏位中來者是有語中無語揀云偏位中來者則兼緣如云即今往來底喚作什麼即得無對洞山自代云不得不得此例亦多呼為有語中無語也釋云洞山問僧三人同行一人解語一人不解語郍個一人是什麼對云此豈不是辨得主客也云是也云如何是客云語與不語俱是客又云如人解弄珠不觸手不落地即今往來底喚作什麼即得無對洞山自代云不得不得此問家涉緣來答家不觸正位而去也有人問老宿不得不得意作麼生宿云試斷看又云落在什麼處此例亦多呼為有語中無語也又揀云語從四大聲色中來不立處所是非故云緣中辨得是偏位中來也引語例者云如什麼物恁麼來亦云光境俱忘復是何物亦云定慧等學明見佛性此例亦多喚作有語中無語釋云六祖問讓和尚什麼處來云嵩山安和尚處來祖云什麼物恁麼來云說似一物即不中祖云還假修證否云修證即不無不敢污染祖云如是如是汝善護持又光境俱忘此是盤山語又黃檗從鹽官領三百眾到南泉每為三百人說法次南泉便到說法處云借此道場還許一問否檗云便請泉問定慧等學明見佛性此理如何云十二時中不依倚一物泉云莫是長老見處麼云不敢泉云將水價即且置草鞋錢教什麼人還有僧舉似洞山山云責狀了喫棒雪峰依仰山山舉南泉問定慧等學明見佛性此理如何云有一人不肯泉云漿水價即且置草鞋錢教什麼人還若據南泉意者掘抗賺虎不同諸家商量黃檗格外宗師氣宇如王未必道不依倚一物然自古相傳如此耳又揀云偏位來明偏位涉緣緣性無體皆同正位釋云緣性無體者言緣性無別體故云正體也又凡有涉緣緣所明者皆歸正位故云同正位也又揀云偏位中來者就物明體如云什麼物恁麼來又光境俱忘復是何物此一例語寄功明位亦是予舊舉例什麼物恁麼來此一例語雖緣中認得不同向去又定慧等學明見佛性此理如何此一例語亦予初舉例語又如光境俱忘為是教中之則不同玄學只要於他教則出宗門中玄學外事也釋云此是曾山高判也未知南泉密意如何也補云按輝本從又如光境至不同玄學等十六餘字落失不舉故但云未知南泉意若何又揀云祇如出息不依眾緣入息不居薀界而住此語全是功不同緣中認得亦是余舊舉例主家抽入正位云有一人無出入息令渠知有正位釋云南天竺國王請諸名德設齋轉經次諸德總轉經唯有般若多羅不轉嘿然而坐王問尊者何故不轉經云出息不依眾緣入息不居陰界而住非但如是經百千萬億卷又揀云更有挾功極則淨潔位亦得呼為偏位中來此難辨須揀得出釋云挾功極則淨潔位者問洞山身命急切處如何云莫雜種云將何奉獻云將虗空奉獻云虗空與非空將來不相似云道相似也得道不相似也得云如何是相似云目前云如何是不相似云目前不是此例語是也又揀云如學士揀僧問洞山如何是玄旨山云如死人舌又問十二時中將何奉獻云無物云是偏位中來此二例語不得呼為偏位中來須各揀若是玄旨一例語可同於祖師意如十二時中將何奉獻云無物此一例語可同於功勛也此二例語並不得呼為偏位及兼帶也前已明破了是借功明位借位明功同於此也釋云真和尚却將死人舌語收入偏位甚有道理曹山揀貶應有別意有人舉問曹山如何是死人舌答云待我鼻頭又舉問老宿宿云道什麼或有相兼帶來者這裡不說有語無語語這裡直須正面而去這裡不得不圓轉事須圓轉揀云相兼帶來者為語勢不偏不正不有不無如全不全似虧不虧唯得正面而去也去則不立的不立的則至妙之言境不圓常情之事也如先師代文殊喫茶話云惜取這個看得麼亦如翠微云每日噇什麼釋云越州無著禪師到五臺山巡遊次忽見一寺樓閣莊嚴便入其寺得遇文殊禮拜文殊留無著喫茶次文殊提起琉璃椀子云彼中還有這個也無著云無殊云既無尋常將什麼喫茶著無對洞山代云莫道有莫道無但展兩手云惜取這個看得麼翠徵設羅漢次有人問今日供養羅漢羅漢來也還來也無微云是儞每日噇什麼圓轉者言護其正位也然在途之語總是病釋云涉緣明事不圓轉不盖覆總是病也不在途之語故云圓轉語例者陸亘大夫在溟州時補曰傳燈作宣州恐此錄誤矣盖宣冥溟三寫之訛出迎南泉入城門次大夫指雍門云諸人總道雍門和尚喚作什麼南泉云恐辱大夫風化又問忽然賊來時作麼生泉云老僧罪過又雲居問洞山如何是西來的的意山云闍梨已後將把茅盖頭忽有人問闍梨向他作麼生道對云某甲罪過就中此語例者圓轉中妙妙圓轉也夫當人先須辨得語句正面而去有語是恁麼來無語是恁麼去釋云有語是恁麼來者為對機故無語是恁麼去者令歸正位故然主客回互用也作家中不無言語不涉有語無語這個喚作兼帶語兼帶語全無的的也釋云圓轉不觸之語也揀云相兼帶來者不落有語無語如藥山帶刀語此是兼帶語臨時看語來勢或當頭正面而去或異中虗此若不妙會則千里萬里也釋云藥山帶刀行次其刀鳴道吾問和尚背後底是什麼物藥山抽刀驀口斫有人問老宿驀口斫意作麼生云不敢向這裡出頭又南泉到湖南禮拜東寺寺問從何處來泉云從江西來云還將得馬大師真來否泉云祇這是云背後底𡁠南泉禮拜有人舉問招慶慶云大似不知此是兼帶語臨時看語來勢又正面而去者僧問洞山學人擬見和尚本來師如何得見山云年涯相似則無阻矣無對雲居代云恁麼則不見和尚本來師問南泉三身中郍個最尊云三隻骰子擲下失劫一個又陸亘大夫問南泉弟子六合來彼中還更有身在也無泉云留取這個語分明舉似后代作家又異中虗此者洞山云頭長三尺語又烏兒白如雪語例有人問茱萸如何是沙門行萸云行則不無認覺則乖僧舉似洞山山云何不問是什麼行其僧持此語却問茱萸是什麼行萸云佛行佛行僧却舉似洞山山云若不因闍梨不識這個老兄僧却問洞山如何是沙門行山云自少養得一個兒頭長三尺項短二寸直至如今不奈何僧舉問曹山此義如何山云闍梨自道看云莫不稱斷事否山喚某甲僧應喏山云適來問什麼事將尺寸來向這裡看僧無對又云百事及一切事總受說唯有沙門不受說佛尚不自知合作麼生說又云天上人間測度不得又問石霜洞山道自少養得一個兒頭長三尺項短二寸直至如今不奈何此意如何霜云大無明即是云如何是大無明霜却指傍邊狗云看有什麼近處又問雲居如何是頭長三尺項短二寸居云從小至大從大至小不小不大恁麼時作麼生又問如何是頭長三尺居云日給難忘云如何是項短二寸居云不奈何云如何是自少養得居云知有云如何是頭長三尺居云過於今時云如何是直至如今不奈何居云闍梨還奈何得麼此是先輩先宿遺言豈不通此事總是圓轉不觸之語也虗此者不觸之言也偈曰頭長項短是誰顏問著全人敢面看從此懷慚長掩戶不將消息到人間又道吾在樂山時遊山歸來藥山問什麼處去來吾云遊山去來山云不離此室速道將來吾云山上烏兒頭似雪㵎下游魚忙不徹此等語例直須子細不得造次近代學士臆斷者多競生異見有人斷云沙門行者稱斷邊語頭長三尺項短二寸者不稱斷語所以就沙門邊拈起向上事此是曲會未達根源所以辨之又揀云引相兼帶來語例者如文殊喫茶語及這個人如今什麼處去也雲岩云作麼作麼又云即今作麼生此例甚多釋曰喫茶語前已明又雲岩共洞山鋤薑地次岩就先德事洞山問此人什麼處去也岩良久云作麼作麼洞山云大遲生也又問雲居佛未出祖未傳時如何云即今作麼生又揀云相兼帶來不涉偏正二途此一位奇絕妙旨難辨號為兼帶皆為明這個一段事況復偏正不同又揀云夫相兼帶來者直須似文殊喫茶語及先師答雲岩鉏薑語并安和尚法堂語及藥山淳布衲洗佛語於中最妙兼帶無過此也舊本欠此也二字藥山答道吾帶刀語及百丈下堂大眾欲散未散時問云是什麼藥山遙聞此語云在也一作此便道暗頭兼帶借功明物借物明功借過明功借功明過等來若是藥山與新豐并前諸德所出超過入正位是玄談奇特句已次到小小得力者則抽入正位此例語常用也吾緣住持多結不及子細略明少分許汝等諸人不須容易輕慢若更有疑滯旋當決了直須勵力修行令未來際不斷此事不得慢洩或值純朴者是奇器亦不可隱耳釋云喫茶語鉏薑語帶刀語前已明了有人問西院安和尚好個法堂合著什麼功德安云作麼作麼又澄一作遵布衲在藥山洗佛次有僧問作什麼衲云洗佛又問只洗得這個還洗得那個也無云把來把來無對舉問招慶慶代云與麼則邪法難扶又有老宿代云在也又藥山問眾近來有海兄信否云有山云近前來有僧從百丈來者皆近前來山問海兄一日十二時中為說什麼法云三句外省去六句外會取亦云未得玄鑑者但依了義教有相親分山云三千里外且喜勿交涉復有僧報云近有曇晟長老二十年在百丈為侍者師遂喚近前來問海兄尋常說什麼法晟云三句外省去六句外會取山又云三千里外且喜勿交涉山又問更有什麼言句晟云和尚說法了大眾下堂出門次驀喚眾云是什麼眾無對山云何不早道在此時晟言下大悟山又云因汝識得百丈也暗頭兼帶語者忠國師驀喚侍者侍者來立國師低頭侍者立多時出去國師喚侍者如是三度了云將謂我辜負汝汝却辜負我百丈舉問趙州國師三喚侍者意作麼生州云如人暗裡書字字雖不成文彩已彰又問曹山國師三喚侍者意作麼生曹山云侍者第二遍回來云某甲不信和尚喚又百丈接一座主主在師邊久立去出門外時師便喚座主主應喏却來侍立良久丈喚如是三度座主罔測便去有人問藥山某甲有疑山云且去且去後令院主打鐘眾僧上來立次山云適來有個闍梨道某甲有疑喚來眾僧推出山便撮胸拽向兩步然後與一推向後云師僧散去又問曹山清歲或本作稅又銳孤貧請師接濟山云近前來其僧近前山云泉州白家三盞酒喫後猶道未甞盃此等語亦多難可盡舉尋思古人語路借物明功者溈山云有句無句如藤倚樹雲岩無對却舉似道吾吾特上來問溈山見說師有此語是否山云是也吾云請師舉溈山問道吾吾云樹倒藤枯時作麼生山云此人較些子又夾山云倒樹無根則不活舉問寂住住云不許用功此例非一借功明物者洞山游田次朗上座指牛云遮個須得看恐喫稻去山云若是好牛不喫稻又問返本還源時如何山云如一片雪從天降下若絲髮大物掛著則終不到地此例語子細看尋借過明功者僧問洞山暫時不在如同死人如何山云好埋却又云也又云命絕也又洞山云知有底人解入地獄不知有底人門外走過此例甚多就過明功也借功明過者問苕溪如何是修行路溪云好個阿師莫客作南泉問陸亘大夫十二時中作麼生夫云寸絲不掛泉云猶是階下漢夫云弟子恁麼道過在什麼處泉云還知道有道之君不納有智之臣此例甚多一一證之借位明功者有問藥山請和尚喫藥食山云不喫云為什麼不喫山云消他底不得云還有能消得底也無山云有云是什麼人山云不抱優婆夷者云和尚為什麼消他底不得山拈起針線卷子云爭奈者個何補曰學論優婆夷者取處塵不染之意言隨染大悲大行又僧問曹山眉與目還相識也無山云不相識云為什麼不相識山云為同在一處云恁麼則不分也山云眉且不是目目且不是眉云如何是目山云端的去云如何是眉山云曹山却疑云和尚為什麼却疑山云若不疑則端的去此例就本位明功也借功明位者洞山問雲岩擬寫和尚真得也無岩云幾得成山云尋常寫真得七八岩云猶是失在山云不失時如何岩云直得十成山云古人道直得十成不似時如何岩云他無成數又洞山勘僧云心法雙忘性即真第幾座僧云第二座山云因什麼不與他第一座無對有一人代云非心非法山云心法雙亡即是非法何更如是道無對山自代云真不得座又問曹山教云一句能吞百千萬義如何是一句山云針劄不入此例亦多細詳之
